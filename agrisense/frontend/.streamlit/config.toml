[theme]
# Earthy, farmer-friendly palette
# ----------------------------------
# primaryColor     → forest green  - buttons, links, active elements
# backgroundColor  → warm parchment - feels like aged paper, not a tech dashboard
# secondaryBackgroundColor → slightly deeper parchment - sidebar, input fields
# textColor        → deep soil brown - readable, warm, not harsh black

primaryColor             = "#367c5c"
backgroundColor          = "#f5efc8"
secondaryBackgroundColor = "#e9e1c9"
textColor                = "#1b1b1b"
font                     = "sans serif"
